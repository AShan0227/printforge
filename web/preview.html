<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintForge 3D Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    canvas {
      display: block;
    }
    
    #toolbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(22, 27, 34, 0.9);
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid #30363d;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    
    #toolbar button {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    
    #toolbar button:hover {
      background: #30363d;
      border-color: #8b949e;
    }
    
    #toolbar button.active {
      background: #238636;
      border-color: #238636;
    }
    
    #info-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #8b949e;
      z-index: 100;
      backdrop-filter: blur(8px);
      min-width: 200px;
    }
    
    #info-panel .label {
      color: #6e7681;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    
    #info-panel .value {
      color: #e6edf3;
      font-size: 14px;
      margin-bottom: 10px;
    }
    
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 1000;
      transition: opacity 0.3s;
    }
    
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #21262d;
      border-top-color: #238636;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #loading-text {
      margin-top: 16px;
      color: #8b949e;
      font-size: 14px;
    }
    
    #drop-zone {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      pointer-events: none;
    }
    
    #drop-zone.active {
      background: rgba(35, 134, 54, 0.1);
      border: 3px dashed #238636;
      pointer-events: all;
    }
    
    #drop-zone.active .drop-text {
      display: block;
    }
    
    .drop-text {
      display: none;
      color: #238636;
      font-size: 24px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading model...</div>
  </div>
  
  <div id="canvas-container"></div>
  
  <div id="toolbar">
    <button id="btn-solid" class="active">Solid</button>
    <button id="btn-wireframe">Wireframe</button>
    <button id="btn-transparent">Transparent</button>
    <button id="btn-reset">Reset View</button>
    <button id="btn-fullscreen">Fullscreen</button>
  </div>
  
  <div id="info-panel">
    <div class="label">Vertices</div>
    <div class="value" id="info-vertices">—</div>
    <div class="label">Faces</div>
    <div class="value" id="info-faces">—</div>
    <div class="label">Status</div>
    <div class="value" id="info-status">No model</div>
  </div>
  
  <div id="drop-zone">
    <div class="drop-text">Drop GLB or STL file to preview</div>
  </div>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/STLLoader.js"></script>
  
  <script>
    // ── State ────────────────────────────────────────────────────────────────
    let scene, camera, renderer, controls, currentModel;
    let currentMode = 'solid';
    
    const container = document.getElementById('canvas-container');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const infoVertices = document.getElementById('info-vertices');
    const infoFaces = document.getElementById('info-faces');
    const infoStatus = document.getElementById('info-status');
    const dropZone = document.getElementById('drop-zone');
    
    // ── Init ──────────────────────────────────────────────────────────────────
    function init() {
      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d1117);
      
      // Camera
      camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(3, 2, 3);
      
      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container.appendChild(renderer.domElement);
      
      // Controls
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 0.5;
      controls.maxDistance = 20;
      
      // Lights
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);
      
      const key = new THREE.DirectionalLight(0xffffff, 1.2);
      key.position.set(5, 8, 5);
      key.castShadow = true;
      key.shadow.mapSize.width = 2048;
      key.shadow.mapSize.height = 2048;
      scene.add(key);
      
      const fill = new THREE.DirectionalLight(0x88ccff, 0.4);
      fill.position.set(-5, 3, -5);
      scene.add(fill);
      
      const rim = new THREE.DirectionalLight(0xffffff, 0.3);
      rim.position.set(0, 5, -8);
      scene.add(rim);
      
      // Ground grid
      const grid = new THREE.GridHelper(10, 20, 0x21262d, 0x161b22);
      grid.position.y = -0.5;
      scene.add(grid);
      
      // Platform
      const platformGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.05, 64);
      const platformMat = new THREE.MeshStandardMaterial({ 
        color: 0x161b22, 
        metalness: 0.8, 
        roughness: 0.3 
      });
      const platform = new THREE.Mesh(platformGeo, platformMat);
      platform.position.y = -0.475;
      platform.receiveShadow = true;
      scene.add(platform);
      
      // Resize handler
      window.addEventListener('resize', onResize);
      
      // Start render loop
      animate();
      
      // Check for model in URL
      const params = new URLSearchParams(window.location.search);
      const modelUrl = params.get('url');
      if (modelUrl) {
        loadModelFromURL(modelUrl);
      }
    }
    
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    // ── Model Loading ─────────────────────────────────────────────────────────
    function loadModel(url) {
      showLoading('Loading model...');
      clearModel();
      infoStatus.textContent = 'Loading...';
      
      const extension = url.split('.').pop().toLowerCase();
      
      if (extension === 'glb' || extension === 'gltf') {
        const loader = new THREE.GLTFLoader();
        loader.load(
          url,
          (gltf) => {
            currentModel = gltf.scene;
            centerAndScale(currentModel);
            scene.add(currentModel);
            
            // Apply materials
            currentModel.traverse((child) => {
              if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                if (!child.material) {
                  child.material = new THREE.MeshStandardMaterial({ 
                    color: 0x238636,
                    metalness: 0.1,
                    roughness: 0.7
                  });
                }
              }
            });
            
            // Count geometry stats
            let vertices = 0, faces = 0;
            currentModel.traverse((child) => {
              if (child.isMesh && child.geometry) {
                const geo = child.geometry;
                vertices += geo.attributes.position?.count || 0;
                faces += geo.index ? geo.index.count / 3 : (geo.attributes.position?.count || 0) / 3;
              }
            });
            
            infoVertices.textContent = vertices.toLocaleString();
            infoFaces.textContent = Math.round(faces).toLocaleString();
            infoStatus.textContent = 'Loaded';
            
            applyMode(currentMode);
            hideLoading();
          },
          (progress) => {
            if (progress.total > 0) {
              const pct = Math.round((progress.loaded / progress.total) * 100);
              loadingText.textContent = `Loading... ${pct}%`;
            }
          },
          (err) => {
            console.error('GLTF load error:', err);
            infoStatus.textContent = 'Load failed';
            hideLoading();
          }
        );
      } else if (extension === 'stl') {
        const loader = new THREE.STLLoader();
        loader.load(
          url,
          (geometry) => {
            const material = new THREE.MeshStandardMaterial({
              color: 0x238636,
              metalness: 0.1,
              roughness: 0.7
            });
            currentModel = new THREE.Mesh(geometry, material);
            currentModel.castShadow = true;
            currentModel.receiveShadow = true;
            
            centerAndScale(currentModel);
            scene.add(currentModel);
            
            const vertCount = geometry.attributes.position?.count || 0;
            const faceCount = vertCount / 3;
            infoVertices.textContent = vertCount.toLocaleString();
            infoFaces.textContent = Math.round(faceCount).toLocaleString();
            infoStatus.textContent = 'Loaded';
            
            applyMode(currentMode);
            hideLoading();
          },
          undefined,
          (err) => {
            console.error('STL load error:', err);
            infoStatus.textContent = 'Load failed';
            hideLoading();
          }
        );
      }
    }
    
    function loadModelFromURL(url) {
      // If relative URL, prepend server address
      if (!url.startsWith('http')) {
        url = 'http://localhost:8000' + url;
      }
      loadModel(url);
    }
    
    function clearModel() {
      if (currentModel) {
        scene.remove(currentModel);
        currentModel.traverse((child) => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach(m => m.dispose());
            } else {
              child.material.dispose();
            }
          }
        });
        currentModel = null;
      }
      infoVertices.textContent = '—';
      infoFaces.textContent = '—';
      infoStatus.textContent = 'No model';
    }
    
    function centerAndScale(model) {
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      
      // Center at origin
      model.position.sub(center);
      
      // Scale to fit in a 2-unit sphere
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2 / maxDim;
      model.scale.setScalar(scale);
    }
    
    // ── View Modes ────────────────────────────────────────────────────────────
    function applyMode(mode) {
      if (!currentModel) return;
      
      currentModel.traverse((child) => {
        if (!child.isMesh) return;
        
        const originalColor = new THREE.Color(0x238636);
        const mat = child.material;
        
        if (mode === 'wireframe') {
          if (!Array.isArray(mat)) {
            child.material = new THREE.MeshBasicMaterial({ 
              color: 0x238636,
              wireframe: true 
            });
          }
        } else if (mode === 'transparent') {
          if (!Array.isArray(mat)) {
            child.material = new THREE.MeshStandardMaterial({
              color: originalColor,
              metalness: 0.1,
              roughness: 0.7,
              transparent: true,
              opacity: 0.5
            });
          }
        } else {  // solid
          if (mat.wireframe || mat.transparent) {
            child.material = new THREE.MeshStandardMaterial({
              color: originalColor,
              metalness: 0.1,
              roughness: 0.7
            });
          }
        }
      });
    }
    
    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${mode === 'solid' ? 'solid' : mode === 'wireframe' ? 'wireframe' : 'transparent'}`).classList.add('active');
      applyMode(mode);
    }
    
    // ── Loading ────────────────────────────────────────────────────────────────
    function showLoading(text) {
      loadingText.textContent = text;
      loadingOverlay.classList.remove('hidden');
    }
    
    function hideLoading() {
      loadingOverlay.classList.add('hidden');
    }
    
    // ── Toolbar Handlers ──────────────────────────────────────────────────────
    document.getElementById('btn-solid').addEventListener('click', () => setMode('solid'));
    document.getElementById('btn-wireframe').addEventListener('click', () => setMode('wireframe'));
    document.getElementById('btn-transparent').addEventListener('click', () => setMode('transparent'));
    
    document.getElementById('btn-reset').addEventListener('click', () => {
      camera.position.set(3, 2, 3);
      controls.target.set(0, 0, 0);
      controls.update();
    });
    
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
    
    // ── Drag & Drop ────────────────────────────────────────────────────────────
    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('active');
    });
    
    document.addEventListener('dragleave', (e) => {
      if (e.relatedTarget === null) {
        dropZone.classList.remove('active');
      }
    });
    
    document.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('active');
      
      const file = e.dataTransfer.files[0];
      if (!file) return;
      
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['glb', 'gltf', 'stl'].includes(ext)) {
        alert('Unsupported format. Please use GLB, GLTF, or STL.');
        return;
      }
      
      const url = URL.createObjectURL(file);
      loadModel(url);
    });
    
    // ── Keyboard shortcuts ─────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === '1') setMode('solid');
      if (e.key === '2') setMode('wireframe');
      if (e.key === '3') setMode('transparent');
      if (e.key === 'r') {
        camera.position.set(3, 2, 3);
        controls.target.set(0, 0, 0);
        controls.update();
      }
    });
    
    init();
  </script>
</body>
</html>
